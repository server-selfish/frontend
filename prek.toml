[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-yaml",
    stages = ['pre-commit']
  },
  { id = "end-of-file-fixer",
    stages = ['pre-commit']
  },
  { id = "trailing-whitespace",
    stages = ['pre-commit']
  },
  { id = "detect-private-key",
    stages = ['pre-commit']
  },
]

[[repos]]
repo = "local"
hooks = [
  { id = "prettier",
    name = "Prettier",
    entry = "bunx prettier --write",
    language = "system",
    files = "\\.(js|ts|tsx|jsx|json|css|md)$",
    stages = ['pre-commit']
  },
  { id = "eslint",
    name = "ESLint",
    entry = "bunx eslint --fix",
    language = "system",
    files = "\\.(js|ts|tsx|jsx)$",
    stages = ['pre-commit']
  },
  { id = "typescript-typecheck",
    name = "TypeScript Type Check",
    entry = "bunx tsc --noEmit",
    language = "system",
    pass_filenames = false,
    stages = ['pre-push']
  },
]
